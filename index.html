<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation | 我們的婚禮邀約</title>
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F9F1DC;
            --dark-text: #4A4A4A;
            --white: #FFFFFF;
            /* 滾動動畫秒數由 JS 控制，這裡僅作變數預留 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none; /* 禁止反白 */
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍色高亮 */
        }

        body, html {
            overflow: hidden; 
            width: 100%;
            height: 100%;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--gold-light);
        }

        /* --- 掀開信封動畫 --- */
        #envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .envelope {
            width: 280px;
            height: 180px;
            background: #fdfdfd;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            cursor: pointer;
        }

        .envelope::after {
            content: "Open Invitation";
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: var(--gold-primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 90px solid #f0f0f0;
            transform-origin: top;
            transition: transform 1s ease;
            z-index: 2;
        }

        .opened-envelope { transform: translateY(-100%); pointer-events: none; }
        .opened-flap { transform: rotateX(180deg); }

        /* --- 頁面容器 --- */
        #main-scroll-container {
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .section {
            height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
        }

        /* --- 提示標籤 --- */
        #scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--white);
            z-index: 100;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
            font-size: 0.85rem;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        /* --- 資訊卡片 --- */
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 2px;
            border: 1px solid var(--gold-primary);
            text-align: center;
            width: 85%;
            max-width: 400px;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .info-card h2 { color: var(--gold-primary); margin-bottom: 20px; font-weight: normal; letter-spacing: 3px; }
        .info-card p { margin: 12px 0; font-size: 0.95rem; color: var(--dark-text); }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 40px;
            background: var(--gold-primary);
            color: white;
            text-decoration: none;
            border-radius: 1px;
            font-size: 0.9rem;
        }

        .map-img { width: 100%; margin-top: 20px; filter: grayscale(0.3); }

    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="bgm" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="envelope-wrapper">
        <div class="envelope" id="envelope-btn">
            <div class="envelope-flap" id="flap"></div>
        </div>
    </div>

    <div id="scroll-hint">點擊或下滑觀看內容</div>

    <div id="main-scroll-container">
        <section class="section" id="sec-1">
            <div class="overlay"></div>
            <h1 style="color:white; z-index:1; font-weight:lighter; letter-spacing:8px; font-size:1.5rem;">SAVE THE DATE</h1>
        </section>

        <section class="section" id="sec-2">
            <div class="overlay"></div>
        </section>

        <section class="section" id="sec-3">
            <div class="overlay"></div>
        </section>

        <section class="section" id="sec-info" style="background-image: none !important;">
            <div class="info-card">
                <h2>Wedding Day</h2>
                <p><b>王小明 & 陳小美</b></p>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <p>2026年12月25日 (五)</p>
                <p>12:00 入席 | 12:30 開席</p>
                <p>台北晶華酒店 3F 宴會廳</p>
                <p><small>台北市中山區中山北路二段39巷3號</small></p>
                <img src="https://picsum.photos/400/200" class="map-img" alt="Map">
                <a href="https://forms.gle/example" class="btn-rsvp">填寫報名表單</a>
            </div>
        </section>
    </div>

    <script>
        /**
         * 配置參數
         */
        const config = {
            scrollDuration: 1500,    // 頁面滑動動畫時間 (ms)
            autoPlayDelay: 5000,     // 自動切換間隔 (ms)
            musicLink: 'music.mp3',
            images: [
                'https://picsum.photos/1080/1920?random=10',
                'https://picsum.photos/1080/1920?random=11',
                'https://picsum.photos/1080/1920?random=12'
            ]
        };

        let currentStep = 0;
        const totalSteps = 4; 
        let isAnimating = false;
        let autoPlayTimer = null;
        let isOpened = false;

        const container = document.getElementById('main-scroll-container');
        const bgm = document.getElementById('bgm');

        // 初始化：套用圖片與動畫秒數
        document.querySelectorAll('.section').forEach((sec, i) => {
            if (config.images[i]) sec.style.backgroundImage = `url('${config.images[i]}')`;
        });
        container.style.transitionDuration = `${config.scrollDuration}ms`;

        /**
         * 啟動/重置自動播放計時器
         */
        function startAutoPlay() {
            stopAutoPlay(); // 先清除舊的
            if (currentStep < totalSteps - 1) { // 沒到最後一頁才播
                autoPlayTimer = setTimeout(() => {
                    nextPage();
                }, config.autoPlayDelay);
            }
        }

        function stopAutoPlay() {
            if (autoPlayTimer) clearTimeout(autoPlayTimer);
        }

        /**
         * 切換頁面主函數
         */
        function goToPage(index) {
            if (!isOpened || isAnimating) return;
            if (index < 0 || index >= totalSteps) return;

            isAnimating = true;
            currentStep = index;
            
            // 執行位移
            container.style.transform = `translateY(-${currentStep * 100}vh)`;

            // 處理提示消失
            const hint = document.getElementById('scroll-hint');
            hint.style.opacity = (currentStep === totalSteps - 1) ? "0" : "1";

            // 動態結束後重置
            setTimeout(() => {
                isAnimating = false;
                startAutoPlay(); // 每次手動或自動切換完後重啟 5 秒計時
            }, config.scrollDuration);
        }

        function nextPage() { goToPage(currentStep + 1); }
        function prevPage() { goToPage(currentStep - 1); }

        /**
         * 掀開信封
         */
        document.getElementById('envelope-btn').addEventListener('click', function() {
            document.getElementById('flap').classList.add('opened-flap');
            
            setTimeout(() => {
                document.getElementById('envelope-wrapper').classList.add('opened-envelope');
                isOpened = true;
                bgm.play();
                startAutoPlay(); // 開啟後開始計時自動播放
            }, 800);
        });

        /**
         * 交互監聽：點擊、滾輪、觸控
         */
        
        // 1. 全域點擊切換 (修正手機無法點擊問題)
        window.addEventListener('click', (e) => {
            if (!isOpened || isAnimating) return;
            // 排除按鈕與地圖圖片的點擊，避免點了表單卻跳頁
            if (e.target.closest('.info-card') || e.target.closest('.envelope')) return;
            
            nextPage();
        });

        // 2. 滾輪監聽
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) nextPage();
            else prevPage();
        }, { passive: true });

        // 3. 手機滑動監聽
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!isOpened) return;
            let touchEndY = e.changedTouches[0].clientY;
            let diff = touchStartY - touchEndY;

            if (Math.abs(diff) > 50) { // 滑動距離大於 50px 才判定
                if (diff > 0) nextPage();
                else prevPage();
            }
        }, { passive: true });

    </script>
</body>
</html>
