<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="威廷與佳怡的婚禮邀約" />
    <meta property="og:description" content="輕輕點開信封，讓音樂與回憶流淌。我們誠摯邀請你參與這場愛的慶典，點擊連結，開啟我們的婚禮邀請函。" />
    <meta property="og:image" content="pic/cover.jpg" />
    <meta property="og:type" content="website" />
    <title>Wedding Invitation | 威廷與佳怡的婚禮邀約</title>
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F9F1DC;
            --dark-text: #4A4A4A;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none; /* 預設禁止反白 */
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- 允許反白選擇的區塊 --- */
        .allow-select, .info-card p, .info-card small {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        body, html {
            overflow: hidden; 
            width: 100%;
            height: 100%;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--gold-light);
        }

        /* --- 燈箱 (Lightbox) 樣式 --- */
        #photo-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            cursor: zoom-out;
        }

        #photo-overlay.active { display: flex; opacity: 1; }
        #photo-overlay img { max-width: 90%; max-height: 80%; border: 2px solid var(--white); box-shadow: 0 0 25px rgba(0,0,0,0.5); }

        /* --- 掀開信封動畫 --- */
        #envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .envelope {
            width: 280px;
            height: 180px;
            background: #fdfdfd;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            cursor: pointer;
        }

        .envelope::after {
            content: "Open Invitation";
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: var(--gold-primary);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 90px solid #f0f0f0;
            transform-origin: top;
            transition: transform 1s ease;
            z-index: 2;
        }

        .opened-envelope { transform: translateY(-100%); pointer-events: none; }
        .opened-flap { transform: rotateX(180deg); }

        /* --- 頁面容器 --- */
        #main-scroll-container {
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .section {
            height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
        }

        /* --- 提示標籤 --- */
        #scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--white);
            z-index: 100;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
            font-size: 0.85rem;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
        }

        /* --- 資訊卡片 --- */
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border: 1px solid var(--gold-primary);
            text-align: center;
            width: 85%;
            max-width: 400px;
            z-index: 10;
        }

        .info-card h2 { color: var(--gold-primary); margin-bottom: 20px; font-weight: normal; letter-spacing: 3px; }
        .info-card p { margin: 12px 0; font-size: 0.95rem; color: var(--dark-text); }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 40px;
            background: var(--gold-primary);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            -webkit-user-select: none !important;
            user-select: none !important;
        }

        .map-img { width: 100%; margin-top: 20px; filter: grayscale(0.2); cursor: zoom-in; }

    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="bgm" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="photo-overlay" onclick="closePhoto()">
        <img id="full-res-img" src="" alt="Map Zoom">
        <p style="color:white; position:absolute; bottom:10%; font-size:0.8rem;">點擊任意處關閉</p>
    </div>

    <div id="envelope-wrapper" onclick="openByEnvelope()">
        <div class="envelope" id="envelope-btn">
            <div class="envelope-flap" id="flap"></div>
        </div>
    </div>

    <div id="scroll-hint">點擊或下滑觀看內容</div>

    <div id="main-scroll-container">
        <section class="section" id="sec-1">
            <div class="overlay"></div>
            <h1 style="color:white; z-index:1; font-weight:lighter; letter-spacing:8px; font-size:1.5rem;">SAVE THE DATE</h1>
        </section>

        <section class="section" id="sec-2">
            <div class="overlay"></div>
        </section>

        <section class="section" id="sec-3">
            <div class="overlay"></div>
        </section>

        <section class="section" id="sec-info" style="background-image: none !important;">
            <div class="info-card">
                <h2>Wedding Day</h2>
                <p><b>李威廷 & 連佳怡</b></p>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <p>2026年6月27日 (六)</p>
                <p>11:30 入席 | 12:00 開席</p>
                <p>台中林皇宮 1F 紫宴廳</p>
                <p><small class="allow-select">台中市西屯區臺灣大道三段33號<br>捷運市政府站旁</small></p>
                
                <a href="address.jpeg" onclick="openMap(event, this.href)">
                    <img src="address.jpeg" class="map-img" alt="Map">
                </a>
                
                <a href="https://forms.gle/your-link" class="btn-rsvp">填寫報名表單</a>
            </div>
        </section>
    </div>

    <script>
        const config = {
            scrollDuration: 1500,
            autoPlayDelay: 5000, 
            images: [
                'https://picsum.photos/1080/1920?random=10',
                'https://picsum.photos/1080/1920?random=11',
                'https://picsum.photos/1080/1920?random=12'
            ]
        };

        let currentStep = 0;
        const totalSteps = 4; 
        let isAnimating = false;
        let autoPlayTimer = null;
        let isOpened = false;
        let isViewingPhoto = false;

        const container = document.getElementById('main-scroll-container');
        const bgm = document.getElementById('bgm');

        document.querySelectorAll('.section').forEach((sec, i) => {
            if (config.images[i]) sec.style.backgroundImage = `url('${config.images[i]}')`;
        });
        container.style.transitionDuration = `${config.scrollDuration}ms`;

        function openMap(event, href) {
            event.preventDefault();
            if (!isOpened) return;
            isViewingPhoto = true;
            stopAutoPlay();
            const overlay = document.getElementById('photo-overlay');
            const fullImg = document.getElementById('full-res-img');
            fullImg.src = href;
            overlay.classList.add('active');
        }

        function closePhoto() {
            document.getElementById('photo-overlay').classList.remove('active');
            isViewingPhoto = false;
            startAutoPlay();
        }

        function startAutoPlay() {
            stopAutoPlay();
            if (isOpened && !isViewingPhoto && currentStep < totalSteps - 1) {
                autoPlayTimer = setTimeout(() => {
                    goToPage(currentStep + 1);
                }, config.autoPlayDelay);
            }
        }

        function stopAutoPlay() {
            if (autoPlayTimer) clearTimeout(autoPlayTimer);
        }

        function goToPage(index) {
            if (!isOpened || isAnimating || isViewingPhoto) return;
            if (index < 0 || index >= totalSteps) return;

            isAnimating = true;
            currentStep = index;
            container.style.transform = `translateY(-${currentStep * 100}vh)`;

            const hint = document.getElementById('scroll-hint');
            hint.style.opacity = (currentStep === totalSteps - 1) ? "0" : "1";

            setTimeout(() => {
                isAnimating = false;
                startAutoPlay();
            }, config.scrollDuration);
        }

        function openByEnvelope() {
            if(isOpened) return;
            document.getElementById('flap').classList.add('opened-flap');
            setTimeout(() => {
                document.getElementById('envelope-wrapper').classList.add('opened-envelope');
                isOpened = true;
                bgm.play().catch(()=>{});
                startAutoPlay();
            }, 800);
        }

        window.addEventListener('click', (e) => {
            if (!isOpened || isAnimating || isViewingPhoto) return;
            // 允許選取文字時不跳頁
            if (window.getSelection().toString().length > 0) return;
            if (e.target.closest('a') || e.target.closest('.envelope') || e.target.closest('.info-card')) return;
            goToPage(currentStep + 1);
        });

        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) goToPage(currentStep + 1);
            else goToPage(currentStep - 1);
        }, { passive: true });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!isOpened || isViewingPhoto) return;
            let diff = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(diff) > 50) {
                diff > 0 ? goToPage(currentStep + 1) : goToPage(currentStep - 1);
            }
        }, { passive: true });

    </script>
</body>
</html>
