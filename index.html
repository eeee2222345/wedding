<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding Invitation</title>
    <style>
        /* --- 基礎設定 --- */
        :root {
            --gold-primary: #D4AF37;
            --gold-light: #F9F1DC;
            --dark-text: #4A4A4A;
            --white: #FFFFFF;
            --transition-speed: 1.2s; /* 預設切換速度 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none; /* 禁止反白 */
        }

        body, html {
            overflow: hidden; /* 初始鎖定滾動 */
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--gold-light);
            color: var(--dark-text);
        }

        /* --- 信封開場動畫 --- */
        #envelope-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fdfdfd;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            cursor: pointer;
            text-align: center;
        }

        .envelope::before {
            content: "Open";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold-primary);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #eee;
            transform-origin: top;
            transition: transform 1s ease;
        }

        .opened-envelope {
            transform: translateY(-100%);
            pointer-events: none;
        }

        .opened-flap {
            transform: rotateX(180deg);
        }

        /* --- 主內容區塊 --- */
        #main-content {
            height: 100vh;
            width: 100%;
        }

        .section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: transform var(--transition-speed) cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* 圖片遮罩，讓文字更好讀 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
        }

        /* --- 提示文字 --- */
        #scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--white);
            z-index: 50;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        /* --- 資訊欄位 --- */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 5px;
            border: 2px solid var(--gold-primary);
            text-align: center;
            max-width: 90%;
            width: 400px;
            z-index: 10;
        }

        .info-card h2 { color: var(--gold-primary); margin-bottom: 20px; }
        .info-card p { margin: 10px 0; line-height: 1.6; }
        
        .btn-rsvp {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--gold-primary);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .map-img {
            width: 100%;
            margin-top: 15px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <audio id="bgm" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="envelope-wrapper">
        <div class="envelope" onclick="openInvitation()">
            <div class="envelope-flap" id="flap"></div>
        </div>
    </div>

    <div id="scroll-hint">下滑或點擊看更多 ↓</div>

    <div id="main-content">
        <section class="section" id="sec-0">
            <div class="overlay"></div>
            <h1 style="color: white; z-index: 10; font-size: 2.5rem; letter-spacing: 5px;">WE ARE GETTING MARRIED</h1>
        </section>

        <section class="section" id="sec-1">
            <div class="overlay"></div>
        </section>

        <section class="section" id="sec-2">
            <div class="overlay"></div>
        </section>

        <section class="section" id="sec-3" style="background-image: none; background-color: var(--gold-light);">
            <div class="info-card">
                <h2>Wedding Invitation</h2>
                <p><strong>新人：</strong> 王小明 & 陳小美</p>
                <p><strong>日期：</strong> 2026年12月25日</p>
                <p><strong>時間：</strong> 12:00 入席 / 12:30 開席</p>
                <p><strong>地點：</strong> 台北晶華酒店 3F 宴會廳</p>
                <p><strong>交通提示：</strong> 近捷運中山站，提供免費停車 3 小時</p>
                <img src="https://picsum.photos/400/200" alt="Parking Map" class="map-img">
                <br>
                <a href="https://your-google-form-link" class="btn-rsvp" target="_blank">點我填寫出席表單</a>
            </div>
        </section>
    </div>

    <script>
        /**
         * 參數設定區
         */
        const config = {
            scrollDuration: 1200, // 頁面切換秒數 (毫秒)
            musicSrc: 'music.mp3',
            images: [
                'https://picsum.photos/1080/1920?random=1', // 第一張圖
                'https://picsum.photos/1080/1920?random=2', // 第二張圖
                'https://picsum.photos/1080/1920?random=3'  // 第三張圖
            ]
        };

        let currentStep = 0;
        const totalSteps = 4; // 包含資訊頁總共四頁
        let isAnimating = false;
        const bgm = document.getElementById('bgm');

        // 初始化圖片與設定速度
        document.querySelectorAll('.section').forEach((sec, idx) => {
            if(config.images[idx]) {
                sec.style.backgroundImage = `url('${config.images[idx]}')`;
            }
            sec.style.transitionDuration = `${config.scrollDuration}ms`;
        });

        /**
         * 打開信封
         */
        function openInvitation() {
            document.getElementById('flap').classList.add('opened-flap');
            
            setTimeout(() => {
                document.getElementById('envelope-wrapper').classList.add('opened-envelope');
                document.body.style.overflow = 'visible'; // 允許邏輯控制下的滾動
                bgm.play().catch(e => console.log("Autoplay blocked, needs user interaction"));
            }, 800);
        }

        /**
         * 切換頁面邏輯
         */
        function goToStep(step) {
            if (step < 0 || step >= totalSteps || isAnimating) return;
            
            isAnimating = true;
            currentStep = step;

            const offset = -currentStep * 100;
            document.querySelectorAll('.section').forEach(sec => {
                sec.style.transform = `translateY(${offset}%)`;
            });

            // 處理提示文字消失
            const hint = document.getElementById('scroll-hint');
            if (currentStep === totalSteps - 1) {
                hint.style.display = 'none';
            } else {
                hint.style.display = 'block';
            }

            setTimeout(() => {
                isAnimating = false;
            }, config.scrollDuration);
        }

        /**
         * 監聽滾動與點擊
         */
        window.addEventListener('wheel', (e) => {
            if (document.getElementById('envelope-wrapper').classList.contains('opened-envelope')) {
                if (e.deltaY > 0) goToStep(currentStep + 1);
                else goToStep(currentStep - 1);
            }
        });

        // 點擊畫面切換
        window.addEventListener('click', (e) => {
            // 如果還沒打開信封，不執行切換
            if (!document.getElementById('envelope-wrapper').classList.contains('opened-envelope')) return;
            // 如果點擊的是按鈕或表單，不切換
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
            
            goToStep(currentStep + 1);
        });

        // 手機滑動支援
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', (e) => {
            let touchEndY = e.changedTouches[0].clientY;
            if (touchStartY > touchEndY + 50) goToStep(currentStep + 1);
            else if (touchStartY < touchEndY - 50) goToStep(currentStep - 1);
        });

    </script>
</body>
</html>
